services:
  db:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=ledger_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - '5432:5432'

  web:
    build: .
    volumes:
      - ./src:/app/src
    ports:
      - '8000:8000'
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data:
