services:
  db:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=ledger_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - '5432:5432'

  web:
    build:
      context: ./backend # Point directly to the backend folder
    volumes:
      - ./backend:/app # Map the whole folder so manage.py is available
    ports:
      - '8000:8000'
    env_file:
      - ./backend/.env
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: ledger_frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - WATCHPACK_POLLING=true # Helps with hot-reload in Docker
    env_file:
      - ./frontend/.env.local
    depends_on:
      - web

  nginx:
    image: nginx:alpine
    container_name: ledger_nginx
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
      - frontend
volumes:
  postgres_data:
